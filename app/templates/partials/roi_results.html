<div class="results-grid">
  <div class="card">
    <p class="result-card__label">ROI %</p>
    <p class="result-card__value result-card__value--accent">{{ result.roi_percent }}%</p>
  </div>
  <div class="card">
    <p class="result-card__label">Термін окупності</p>
    <p class="result-card__value">{{ result.break_even_months }} міс.</p>
  </div>
  <div class="card">
    <p class="result-card__label">Дохід за 5 років</p>
    <p class="result-card__value">${{ result.projected_income_5y }}</p>
  </div>
  <div class="card">
    <p class="result-card__label">Дохід за 10 років</p>
    <p class="result-card__value">${{ result.projected_income_10y }}</p>
  </div>
</div>
