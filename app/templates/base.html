<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Калькулятор ROI освіти{% endblock %}</title>
    <!-- Тема застосовується ДО завантаження CSS, щоб уникнути мигання -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      }());
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block styles %}{% endblock %}
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav container">
        <a href="/" class="site-nav__brand">ROI освіти</a>
        <div class="site-nav__links">
          <button id="theme-toggle" class="nav-link">🌗 Тема</button>
          <a href="/calculator" class="nav-link">Калькулятор</a>
          <a href="/login" class="nav-link">Увійти</a>
          <a href="/register" class="btn btn--dark btn--sm">Реєстрація</a>
        </div>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
