{% extends "base.html" %}
{% block title %}Login | Education ROI{% endblock %}
{% block content %}
<section class="mx-auto max-w-md px-4 py-16">
  <h1 class="text-3xl font-semibold tracking-tight">Login</h1>
  <form class="mt-8 space-y-5 rounded-lg border border-zinc-200 bg-white p-6 shadow-sm" data-auth-form="login">
    <div>
      <label for="email" class="text-sm font-medium text-zinc-700">Email</label>
      <input id="email" name="email" type="email" required class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2 focus:border-emerald-600 focus:outline-none">
    </div>
    <div>
      <label for="password" class="text-sm font-medium text-zinc-700">Password</label>
      <input id="password" name="password" type="password" required class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2 focus:border-emerald-600 focus:outline-none">
    </div>
    <p class="hidden rounded-md bg-red-50 px-3 py-2 text-sm text-red-700" data-form-error></p>
    <button type="submit" class="w-full rounded-md bg-zinc-950 px-4 py-2.5 text-sm font-semibold text-white hover:bg-zinc-800">Login</button>
  </form>
</section>
{% endblock %}
