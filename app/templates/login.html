{% extends "base.html" %}
{% block title %}Вхід | ROI освіти{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}
{% block content %}
<section class="auth-section">
  <h1 class="auth-title">Вхід</h1>
  <form class="card auth-form" data-auth-form="login">
    <div class="form-group">
      <label for="email" class="form-label">Електронна пошта</label>
      <input id="email" name="email" type="email" required
             class="form-input" placeholder="example@mail.com">
    </div>
    <div class="form-group">
      <label for="password" class="form-label">Пароль</label>
      <input id="password" name="password" type="password" required
             class="form-input" placeholder="••••••••">
    </div>
    <p class="form-error" data-form-error></p>
    <button type="submit" class="btn btn--dark btn--full">Увійти</button>
    <p class="auth-footer">
      Немає акаунту?
      <a href="/register" class="text-link">Зареєструватись</a>
    </p>
  </form>
</section>
{% endblock %}
