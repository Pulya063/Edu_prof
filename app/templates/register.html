{% extends "base.html" %}
{% block title %}Реєстрація | ROI освіти{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}
{% block content %}
<section class="auth-section">
  <h1 class="auth-title">Реєстрація</h1>
  <form class="card auth-form" data-auth-form="register">
    <div class="form-group">
      <label for="email" class="form-label">Електронна пошта</label>
      <input id="email" name="email" type="email" required
             class="form-input" placeholder="example@mail.com">
    </div>
    <div class="form-group">
      <label for="password" class="form-label">Пароль</label>
      <input id="password" name="password" type="password" minlength="8" required
             class="form-input" placeholder="Мінімум 8 символів">
    </div>
    <div class="form-group">
      <label for="confirm_password" class="form-label">Підтвердження пароля</label>
      <input id="confirm_password" name="confirm_password" type="password" minlength="8" required
             class="form-input" placeholder="Повторіть пароль">
    </div>
    <p class="form-error" data-form-error></p>
    <button type="submit" class="btn btn--dark btn--full">Зареєструватись</button>
    <p class="auth-footer">
      Вже є акаунт?
      <a href="/login" class="text-link">Увійти</a>
    </p>
  </form>
</section>
{% endblock %}
